  - Health Check
  - Metrics
  - Management
  properties:
  - type: Documentation
    url: https://docs.spring.io/spring-boot/docs/current/actuator-api/htmlsingle/
  - type: OpenAPI
    url: openapi/spring-boot-actuator-openapi.yml
