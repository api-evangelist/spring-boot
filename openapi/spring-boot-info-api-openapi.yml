openapi: 3.0.3
info:
  title: Spring Boot Actuator Application Info API
  description: Spring Boot Actuator exposes production-ready management and monitoring endpoints for Spring Boot applications. Endpoints provide health checks, metrics, environment info, configuration properties, thread dumps, and more.
  version: 3.3.0
  contact:
    name: Spring Team
    url: https://spring.io/projects/spring-boot
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
- url: http://localhost:8080/actuator
  description: Default Actuator base path
tags:
- name: Info
paths:
  /info:
    get:
      operationId: getInfo
      summary: Spring Boot Application info
      description: Returns arbitrary application info from InfoContributor beans
      tags:
      - Info
      responses:
        '200':
          description: Application information
          content:
            application/vnd.spring-boot.actuator.v3+json:
              schema:
                type: object
                additionalProperties: true
            application/json:
              schema:
                type: object
                additionalProperties: true
