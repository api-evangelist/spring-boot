openapi: 3.0.3
info:
  title: Spring Boot Actuator Application JVM API
  description: Spring Boot Actuator exposes production-ready management and monitoring endpoints for Spring Boot applications. Endpoints provide health checks, metrics, environment info, configuration properties, thread dumps, and more.
  version: 3.3.0
  contact:
    name: Spring Team
    url: https://spring.io/projects/spring-boot
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
- url: http://localhost:8080/actuator
  description: Default Actuator base path
tags:
- name: JVM
paths:
  /threaddump:
    get:
      operationId: getThreadDump
      summary: Spring Boot Thread dump
      description: Returns a snapshot of all threads in the JVM
      tags:
      - JVM
      responses:
        '200':
          description: Thread dump
          content:
            application/json:
              schema:
                type: object
  /heapdump:
    get:
      operationId: getHeapDump
      summary: Spring Boot Heap dump
      description: Returns an hprof heap dump file
      tags:
      - JVM
      responses:
        '200':
          description: Heap dump binary file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
