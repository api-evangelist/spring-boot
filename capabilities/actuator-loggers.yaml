naftiko: 1.0.0-alpha2
info:
  label: Spring Boot Actuator API — Loggers
  description: 'Spring Boot Actuator API — Loggers. 3 operations. Lead operation: Spring Boot List all loggers and their levels.
    Self-contained Naftiko capability covering one Spring Boot business surface.'
  tags:
  - Spring Boot
  - Loggers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPRING_BOOT_API_KEY: SPRING_BOOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: actuator-loggers
    baseUri: http://localhost:8080/actuator
    description: Spring Boot Actuator API — Loggers business capability. Self-contained, no shared references.
    resources:
    - name: loggers
      path: /loggers
      operations:
      - name: getloggers
        method: GET
        description: Spring Boot List all loggers and their levels
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: loggers-name
      path: /loggers/{name}
      operations:
      - name: getlogger
        method: GET
        description: Spring Boot Get logger level
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
      - name: setloggerlevel
        method: POST
        description: Spring Boot Set logger level at runtime
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: actuator-loggers-rest
    port: 8080
    description: REST adapter for Spring Boot Actuator API — Loggers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/loggers
      name: loggers
      description: REST surface for loggers.
      operations:
      - method: GET
        name: getloggers
        description: Spring Boot List all loggers and their levels
        call: actuator-loggers.getloggers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/loggers/{name}
      name: loggers-name
      description: REST surface for loggers-name.
      operations:
      - method: GET
        name: getlogger
        description: Spring Boot Get logger level
        call: actuator-loggers.getlogger
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: setloggerlevel
        description: Spring Boot Set logger level at runtime
        call: actuator-loggers.setloggerlevel
        with:
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: actuator-loggers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Spring Boot Actuator API — Loggers. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: spring-boot-list-all-loggers
      description: Spring Boot List all loggers and their levels
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: actuator-loggers.getloggers
      outputParameters:
      - type: object
        mapping: $.
    - name: spring-boot-get-logger-level
      description: Spring Boot Get logger level
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: actuator-loggers.getlogger
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: spring-boot-set-logger-level
      description: Spring Boot Set logger level at runtime
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: actuator-loggers.setloggerlevel
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
