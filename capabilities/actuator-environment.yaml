naftiko: 1.0.0-alpha2
info:
  label: Spring Boot Actuator API — Environment
  description: 'Spring Boot Actuator API — Environment. 2 operations. Lead operation: Spring Boot Application environment
    properties. Self-contained Naftiko capability covering one Spring Boot business surface.'
  tags:
  - Spring Boot
  - Environment
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPRING_BOOT_API_KEY: SPRING_BOOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: actuator-environment
    baseUri: http://localhost:8080/actuator
    description: Spring Boot Actuator API — Environment business capability. Self-contained, no shared references.
    resources:
    - name: env
      path: /env
      operations:
      - name: getenvironment
        method: GET
        description: Spring Boot Application environment properties
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: env-property
      path: /env/{property}
      operations:
      - name: getenvironmentproperty
        method: GET
        description: Spring Boot Specific environment property value
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: property
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: actuator-environment-rest
    port: 8080
    description: REST adapter for Spring Boot Actuator API — Environment. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/env
      name: env
      description: REST surface for env.
      operations:
      - method: GET
        name: getenvironment
        description: Spring Boot Application environment properties
        call: actuator-environment.getenvironment
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/env/{property}
      name: env-property
      description: REST surface for env-property.
      operations:
      - method: GET
        name: getenvironmentproperty
        description: Spring Boot Specific environment property value
        call: actuator-environment.getenvironmentproperty
        with:
          property: rest.property
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: actuator-environment-mcp
    port: 9090
    transport: http
    description: MCP adapter for Spring Boot Actuator API — Environment. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: spring-boot-application-environment-properties
      description: Spring Boot Application environment properties
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: actuator-environment.getenvironment
      outputParameters:
      - type: object
        mapping: $.
    - name: spring-boot-specific-environment-property
      description: Spring Boot Specific environment property value
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: actuator-environment.getenvironmentproperty
      with:
        property: tools.property
      outputParameters:
      - type: object
        mapping: $.
