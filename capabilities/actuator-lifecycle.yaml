naftiko: 1.0.0-alpha2
info:
  label: Spring Boot Actuator API — Lifecycle
  description: 'Spring Boot Actuator API — Lifecycle. 1 operations. Lead operation: Spring Boot Graceful shutdown. Self-contained
    Naftiko capability covering one Spring Boot business surface.'
  tags:
  - Spring Boot
  - Lifecycle
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPRING_BOOT_API_KEY: SPRING_BOOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: actuator-lifecycle
    baseUri: http://localhost:8080/actuator
    description: Spring Boot Actuator API — Lifecycle business capability. Self-contained, no shared references.
    resources:
    - name: shutdown
      path: /shutdown
      operations:
      - name: shutdown
        method: POST
        description: Spring Boot Graceful shutdown
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: actuator-lifecycle-rest
    port: 8080
    description: REST adapter for Spring Boot Actuator API — Lifecycle. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/shutdown
      name: shutdown
      description: REST surface for shutdown.
      operations:
      - method: POST
        name: shutdown
        description: Spring Boot Graceful shutdown
        call: actuator-lifecycle.shutdown
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: actuator-lifecycle-mcp
    port: 9090
    transport: http
    description: MCP adapter for Spring Boot Actuator API — Lifecycle. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: spring-boot-graceful-shutdown
      description: Spring Boot Graceful shutdown
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: actuator-lifecycle.shutdown
      outputParameters:
      - type: object
        mapping: $.
